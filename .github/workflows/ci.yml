name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: linximengji/agent-core
          path: agent-core
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ./agent-core
      - run: pip install -e .
      - run: python -c "import ops_daemon; print('ops_daemon import OK')"
