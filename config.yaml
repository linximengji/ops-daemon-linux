checks:
  claudetalk:
    enabled: true
    host: 127.0.0.1
    port: 9877
    timeout_seconds: 5
  cloudflared:
    enabled: true
    idle_timeout: 600
  defense_layers:
    enabled: true
  docker_compose:
    enabled: false
  feishu_bridge:
    enabled: true
    host: 127.0.0.1
    port: 9878
    timeout_seconds: 5
  github_ci:
    enabled: false
  log_scanner:
    enabled: false
  logs:
    enabled: false
  mcp_server:
    enabled: true
    host: 127.0.0.1
    port: 9877
    timeout_seconds: 5
  pact_verify:
    enabled: true
    min_interval: 300
  proxy:
    enabled: true
    host: 127.0.0.1
    port: 4000
    ports:
    - 4000
    - 4002
    timeout_seconds: 3
  report_check:
    enabled: false
  services:
    enabled: true
    mcp_process_names:
    - p1s-mcp
    - blender-mcp
    - image-gen-mcp
    - pdf-mcp
    - drawio-mcp
    - openscad-mcp
  ssl:
    enabled: false
  stats:
    enabled: true
    proxy_url: http://127.0.0.1:4000
    token_usage_path: /home/ubuntu/projects/claudetalk/.claudetalk/token_usage.jsonl
  system:
    cpu_warn_pct: 80
    disk_critical_pct: 90
    disk_warn_pct: 85
    enabled: true
    memory_warn_pct: 85
  zombies:
    enabled: false
daemon:
  check_interval: 60
  data_dir: ./data
  name: ops-daemon
  stop_marker: /home/ubuntu/projects/ops-daemon/.stop
llm:
  diagnosis: true
  enabled: true
notify:
  enabled: true
  feishu: true
  terminal: true
proxy_switch:
  enabled: true
tasks:
  baseline:
    enabled: false
    schedule: 0 * * * *
  daily_report:
    email_to: linximengji@163.com
    enabled: true
    schedule: 30 8 * * *
    sections:
      memory_deep:
        dow: '5'
      tool_audit:
        dow: '1'
  semi_report:
    enabled: true
    schedule: 2 8 * * *
    miniflux: true           # use Miniflux as RSS source instead of direct fetch
alerts:
  cooldown_seconds: 1800
